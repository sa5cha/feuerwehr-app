<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Teilnehmer</title>

<style>
body {
    margin:0;
    background:black;
    color:white;
    font-family:Arial;
    display:flex;
    flex-direction:column;
    height:100vh;
}

img {
    width:100%;
    height:75vh;
    object-fit:cover;
}

.inputBox {
    padding:10px;
    background:#111;
}

input, button {
    width:100%;
    padding:15px;
    margin-top:5px;
    font-size:18px;
    border:none;
    border-radius:8px;
}

button {
    background:#dc2626;
    color:white;
    font-weight:bold;
}
</style>

</head>
<body>

<img id="img" src="">

<div class="inputBox">
<input id="input">
<button onclick="send()">Senden</button>
</div>

<script>

// 🔄 Bild-Update erkennen

let lastUpdate = 0;

setInterval(() => {
let update = localStorage.getItem("update");

if(update && update != lastUpdate){
lastUpdate = update;
document.getElementById("img").src = localStorage.getItem("image");
}
}, 500);

// 📩 Anfrage senden

function send(){
let txt = document.getElementById("input").value;

if(txt.trim() !== ""){
localStorage.setItem("request", txt);
}

document.getElementById("input").value = "";
}

</script>

</body>
</html>
