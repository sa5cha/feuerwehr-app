<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Teilnehmer</title>

<style>
body {
    margin:0;
    background:black;
    color:white;
    font-family:Arial;
    display:flex;
    flex-direction:column;
    height:100vh;
}

img {
    width:100%;
    height:70vh;
    object-fit:cover;
}

.inputBox {
    padding:10px;
    background:#111;
}

input, button {
    width:100%;
    padding:15px;
    margin-top:5px;
    font-size:18px;
    border:none;
    border-radius:8px;
}

button {
    background:#dc2626;
    color:white;
    font-weight:bold;
}
</style>

</head>
<body>

<img id="img" src="">

<div class="inputBox">
<input id="input" placeholder="z.B. Rückansicht / Person / Zugang">
<button onclick="send()">Anfrage senden</button>
</div>

<script>

// 🔄 Bild automatisch aktualisieren
function update(){
let img = localStorage.getItem("image");

if(img){
document.getElementById("img").src = img;
}
}

// 📩 Anfrage senden
function send(){
let txt = document.getElementById("input").value;

if(txt.trim() !== ""){
localStorage.setItem("request", txt);
}

document.getElementById("input").value = "";
}

// 🔁 alle 0,5 Sekunden aktualisieren
setInterval(update, 500);

</script>

</body>
</html>
